name: Build and Release Windows EXE

on:
  push:
    branches:
      - main
      - master
    paths:
      - main.py
      - c_cleaner_plus.spec
      - requirements.txt
      - tools/fast_large_files/**
      - i18n/**
      - config/**
      - configs/**
      - config_store.json
      - common_custom_rules.json
      - rules_cn_apps.json
      - rules_dev_tools.json
      - rules_game_platforms.json
  workflow_dispatch:

concurrency:
  group: build-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Package Windows Executable
    runs-on: windows-latest

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 提取版本号
        shell: bash
        run: |
          echo "main.py 中的版本行："
          grep 'CURRENT_VERSION' main.py

          VERSION=$(grep -oE 'CURRENT_VERSION\s*=\s*"[^"]+"' main.py | grep -oE '"[^"]+"' | tr -d '"')
          if [ -z "$VERSION" ]; then
            echo "无法从 main.py 中提取 CURRENT_VERSION"
            exit 1
          fi

          RELEASE_TAG="v${VERSION}"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> $GITHUB_ENV
          echo "提取到版本号: ${RELEASE_TAG}"

          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} 已存在，该版本已发布过，跳过本次构建"
            echo "SKIP_BUILD=true" >> $GITHUB_ENV
          else
            echo "SKIP_BUILD=false" >> $GITHUB_ENV
          fi

      - name: 3. 设置 Python
        if: env.SKIP_BUILD != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 4. 安装 Python 依赖
        if: env.SKIP_BUILD != 'true'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 5. 设置 Rust
        if: env.SKIP_BUILD != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: 6. 缓存 Cargo
        if: env.SKIP_BUILD != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/fast_large_files

      - name: 7. 构建 NTFS MFT 助手
        if: env.SKIP_BUILD != 'true'
        shell: pwsh
        working-directory: tools/fast_large_files
        run: cargo build --release

      - name: 8. 检查 NTFS MFT 助手
        if: env.SKIP_BUILD != 'true'
        shell: pwsh
        run: |
          $helper = "tools/fast_large_files/target/release/fast_large_files.exe"
          if (!(Test-Path $helper)) {
            Write-Error "未找到 $helper"
            exit 1
          }
          Write-Host "已生成 $helper"

      - name: 9. 安装 UPX
        if: env.SKIP_BUILD != 'true'
        shell: pwsh
        run: choco install upx -y

      - name: 10. PyInstaller 打包
        if: env.SKIP_BUILD != 'true'
        shell: pwsh
        run: pyinstaller c_cleaner_plus.spec --clean
        env:
          PYTHONIOENCODING: utf8

      - name: 11. 创建并推送 Tag
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "Release ${RELEASE_TAG}"
          git push origin "$RELEASE_TAG"
          echo "已创建并推送 Tag: ${RELEASE_TAG}"

      - name: 12. 生成 Release Notes
        if: env.SKIP_BUILD != 'true'
        shell: bash
        run: |
          git log --format="%b" -1 -- main.py c_cleaner_plus.spec tools/fast_large_files > main_release_notes.txt || true

          if [ ! -s main_release_notes.txt ]; then
            echo "常规更新与优化" > main_release_notes.txt
          fi

          echo "" >> main_release_notes.txt
          echo "---" >> main_release_notes.txt

          echo "更新日志内容："
          cat main_release_notes.txt

      - name: 13. 创建 GitHub Release
        if: env.SKIP_BUILD != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body_path: main_release_notes.txt
          prerelease: ${{ contains(env.RELEASE_TAG, 'alpha') || contains(env.RELEASE_TAG, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
